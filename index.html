<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ASCII Art Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #ccc; font-family: 'Courier New', monospace; min-height: 100vh; display: flex; flex-direction: column; }
  #topbar { background: #111; border-bottom: 1px solid #222; padding: 10px 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  h1 { font-size: 12px; letter-spacing: 4px; color: #00ff41; text-shadow: 0 0 10px #00ff4166; flex-shrink: 0; }
  .upload-btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border: 1px solid #00ff41; color: #00ff41; border-radius: 3px; font-family: monospace; font-size: 11px; letter-spacing: 1px; cursor: pointer; background: #00ff4111; flex-shrink: 0; }
  #status { font-size: 10px; color: #444; margin-left: auto; }
  #controls { background: #0e0e0e; border-bottom: 1px solid #1a1a1a; padding: 8px 14px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .mode-btn { padding: 5px 10px; border-radius: 3px; font-family: monospace; font-size: 10px; cursor: pointer; border: 1px solid #2a2a2a; background: transparent; color: #555; }
  .slider-label { font-size: 10px; color: #555; display: flex; align-items: center; gap: 5px; }
  #zoom-bar { background: #0c0c0c; border-bottom: 1px solid #1a1a1a; padding: 7px 14px; display: flex; align-items: center; gap: 8px; }
  .zoom-btn { padding: 4px 10px; border: 1px solid #2a2a2a; background: transparent; color: #555; font-family: monospace; font-size: 14px; cursor: pointer; border-radius: 3px; }
  #zoomVal { font-size: 10px; color: #444; width: 36px; }
  #zoomSlider { flex: 1; }
  #fitBtn { padding: 4px 8px; border: 1px solid #2a2a2a; background: transparent; color: #555; font-family: monospace; font-size: 10px; cursor: pointer; border-radius: 3px; }
  #scrubber-row { display: none; background: #0e0e0e; border-bottom: 1px solid #1a1a1a; padding: 7px 14px; gap: 8px; align-items: center; }
  #scrubber-row.visible { display: flex; }
  #playPauseBtn { padding: 5px 12px; border-radius: 3px; font-family: monospace; font-size: 11px; cursor: pointer; border: 1px solid #00ff41; color: #00ff41; background: transparent; flex-shrink: 0; }
  #timeSlider { flex: 1; }
  #timeLabel { font-size: 10px; color: #444; white-space: nowrap; }
  #output { flex: 1; overflow: auto; padding: 10px; background: #080808; }
  #ascii-wrap { display: none; transform-origin: top left; }
  pre#ascii { font-family: 'Courier New', monospace; white-space: pre; margin: 0; color: #00ff41; font-size: 7px; line-height: 9px; }
  #placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; gap: 10px; }
  #placeholder .icon { font-size: 44px; opacity: 0.25; }
  #placeholder p { font-size: 11px; letter-spacing: 3px; color: #282828; }
  #placeholder small { font-size: 10px; color: #1e1e1e; }
  canvas, video { display: none; }
</style>
</head>
<body>

<div id="topbar">
  <h1>ASCII ART</h1>
  <label class="upload-btn">
    🖼 PHOTO / VIDEO
    <input type="file" id="fileInput" accept="image/*,video/*" style="display:none">
  </label>
  <span id="status">Load a photo or video</span>
</div>

<div id="controls">
  <button class="mode-btn" data-mode="green">green</button>
  <button class="mode-btn" data-mode="amber">amber</button>
  <button class="mode-btn" data-mode="white">white</button>
  <button class="mode-btn" data-mode="color">color</button>
  <label class="slider-label">COLS <span id="colsVal">60</span>
    <input type="range" id="colsSlider" min="20" max="200" value="60" style="width:80px">
  </label>
  <label class="slider-label" style="gap:4px;"><input type="checkbox" id="invertCheck"> INVERT</label>
</div>

<div id="zoom-bar">
  <button class="zoom-btn" id="zoomOut">−</button>
  <input type="range" id="zoomSlider" min="10" max="400" value="100">
  <button class="zoom-btn" id="zoomIn">+</button>
  <span id="zoomVal">100%</span>
  <button id="fitBtn">FIT</button>
</div>

<div id="scrubber-row">
  <button id="playPauseBtn">▶ PLAY</button>
  <input type="range" id="timeSlider" min="0" max="100" value="0" step="0.1">
  <span id="timeLabel">0.0s / 0.0s</span>
</div>

<div id="output">
  <div id="placeholder">
    <div class="icon">🖼</div>
    <p>LOAD A PHOTO OR VIDEO</p>
    <small>JPG · PNG · HEIC · MP4 · MOV</small>
  </div>
  <div id="ascii-wrap">
    <pre id="ascii"></pre>
  </div>
</div>

<canvas id="canvas"></canvas>
<video id="video" muted playsinline></video>

<script>
const CHARS_FWD = " .,:;+*?%S#@".split("");
const CHARS_REV = [...CHARS_FWD].reverse();
const COLORS = { green:"#00ff41", amber:"#ffb000", white:"#e0e0e0", color:"#fff" };

let colorMode = "green";
let cols = 60;
let invert = false;
let zoom = 100;
let currentImage = null;
let isVideo = false;
let rafId = null;
let playing = false;

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d", { willReadFrequently: true });
const video = document.getElementById("video");
const ascii = document.getElementById("ascii");
const asciiWrap = document.getElementById("ascii-wrap");
const placeholder = document.getElementById("placeholder");
const status = document.getElementById("status");

function fmt(s) { return s.toFixed(1) + "s"; }

function applyZoom() {
  asciiWrap.style.transform = `scale(${zoom/100})`;
  document.getElementById("zoomVal").textContent = Math.round(zoom) + "%";
  document.getElementById("zoomSlider").value = Math.round(zoom);
}

function renderSource(source, w, h) {
  const rows = Math.max(1, Math.floor(cols * (h / w) * 0.45));
  canvas.width = cols; canvas.height = rows;
  ctx.clearRect(0, 0, cols, rows);
  ctx.drawImage(source, 0, 0, cols, rows);
  const { data } = ctx.getImageData(0, 0, cols, rows);
  const chars = invert ? CHARS_REV : CHARS_FWD;
  const isColor = colorMode === "color";
  let html = "";
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const i = (y * cols + x) * 4;
      const r = data[i], g = data[i+1], b = data[i+2];
      const ch = chars[Math.floor((0.299*r + 0.587*g + 0.114*b) / 255 * (chars.length-1))];
      html += isColor ? `<span style="color:rgb(${r},${g},${b})">${ch}</span>` : ch;
    }
    html += "\n";
  }
  ascii.innerHTML = html;
  placeholder.style.display = "none";
  asciiWrap.style.display = "inline-block";
}

function renderImage() {
  if (!currentImage) return;
  renderSource(currentImage, currentImage.naturalWidth || currentImage.width, currentImage.naturalHeight || currentImage.height);
}

function videoLoop() {
  if (!playing) return;
  if (video.readyState >= 2) {
    renderSource(video, video.videoWidth, video.videoHeight);
    document.getElementById("timeSlider").value = video.currentTime;
    document.getElementById("timeLabel").textContent = fmt(video.currentTime) + " / " + fmt(video.duration);
  }
  rafId = requestAnimationFrame(videoLoop);
}

document.getElementById("fileInput").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  playing = false;
  if (rafId) cancelAnimationFrame(rafId);
  video.pause(); video.src = "";
  document.getElementById("scrubber-row").classList.remove("visible");
  isVideo = false;
  status.textContent = "Loading…";

  const reader = new FileReader();
  reader.onerror = () => status.textContent = "❌ File read error";

  if (file.type.startsWith("image/")) {
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => { currentImage = img; status.textContent = img.naturalWidth + "×" + img.naturalHeight; renderImage(); };
      img.onerror = () => status.textContent = "❌ Could not load image";
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  } else if (file.type.startsWith("video/")) {
    reader.onload = ev => {
      video.src = ev.target.result;
      video.load();
      video.onloadedmetadata = () => {
        status.textContent = video.videoWidth + "×" + video.videoHeight + " · " + fmt(video.duration);
        const ts = document.getElementById("timeSlider");
        ts.max = video.duration; ts.value = 0;
        document.getElementById("timeLabel").textContent = "0.0s / " + fmt(video.duration);
        document.getElementById("scrubber-row").classList.add("visible");
        isVideo = true;
        video.currentTime = 0;
      };
      video.onseeked = () => { if (!playing) renderSource(video, video.videoWidth, video.videoHeight); };
      video.onerror = () => status.textContent = "❌ Could not decode video";
    };
    reader.readAsDataURL(file);
  } else {
    status.textContent = "❌ Unsupported file";
  }
});

document.getElementById("playPauseBtn").addEventListener("click", () => {
  if (!isVideo) return;
  const btn = document.getElementById("playPauseBtn");
  if (playing) {
    playing = false; video.pause(); if (rafId) cancelAnimationFrame(rafId); btn.textContent = "▶ PLAY";
  } else {
    video.play().then(() => { playing = true; btn.textContent = "⏸ PAUSE"; videoLoop(); }).catch(err => status.textContent = "❌ " + err.message);
  }
});

document.getElementById("timeSlider").addEventListener("input", e => {
  if (isVideo) { video.currentTime = +e.target.value; document.getElementById("timeLabel").textContent = fmt(+e.target.value) + " / " + fmt(video.duration); }
});

document.getElementById("zoomSlider").addEventListener("input", e => { zoom = +e.target.value; applyZoom(); });
document.getElementById("zoomOut").addEventListener("click", () => { zoom = Math.max(10, zoom - 15); applyZoom(); });
document.getElementById("zoomIn").addEventListener("click",  () => { zoom = Math.min(400, zoom + 15); applyZoom(); });
document.getElementById("fitBtn").addEventListener("click",  () => { zoom = 100; applyZoom(); });

let lastDist = null;
document.getElementById("output").addEventListener("touchmove", e => {
  if (e.touches.length !== 2) return;
  e.preventDefault();
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (lastDist) { zoom = Math.max(10, Math.min(400, zoom * dist / lastDist)); applyZoom(); }
  lastDist = dist;
}, { passive: false });
document.getElementById("output").addEventListener("touchend", () => lastDist = null);

document.getElementById("colsSlider").addEventListener("input", e => {
  cols = +e.target.value; document.getElementById("colsVal").textContent = cols;
  if (isVideo) renderSource(video, video.videoWidth, video.videoHeight); else renderImage();
});
document.getElementById("invertCheck").addEventListener("change", e => {
  invert = e.target.checked;
  if (isVideo) renderSource(video, video.videoWidth, video.videoHeight); else renderImage();
});

function applyColor() {
  const c = COLORS[colorMode];
  document.querySelector("h1").style.color = c;
  document.querySelector("h1").style.textShadow = `0 0 10px ${c}66`;
  ascii.style.color = colorMode !== "color" ? c : "";
  document.querySelectorAll(".mode-btn").forEach(x => {
    const m = x.dataset.mode;
    x.style.borderColor = m === colorMode ? COLORS[m] : "#2a2a2a";
    x.style.color = m === colorMode ? COLORS[m] : "#555";
    x.style.background = m === colorMode ? COLORS[m]+"22" : "transparent";
  });
  document.querySelector(".upload-btn").style.borderColor = c;
  document.querySelector(".upload-btn").style.color = c;
  document.querySelector(".upload-btn").style.background = c+"11";
  document.getElementById("playPauseBtn").style.borderColor = c;
  document.getElementById("playPauseBtn").style.color = c;
  document.querySelectorAll("input[type=range]").forEach(r => r.style.accentColor = c);
}
document.querySelectorAll(".mode-btn").forEach(b => {
  b.addEventListener("click", () => {
    colorMode = b.dataset.mode; applyColor();
    if (isVideo) renderSource(video, video.videoWidth, video.videoHeight); else renderImage();
  });
});

applyColor();
applyZoom();
</script>
</body>
</html>
